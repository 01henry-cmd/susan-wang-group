kind = "web"
previewPath = "/"
title = "Susan Wang Group"
version = "1.0.0"
id = "artifacts/susan-wang-group"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19121

[services.development]
run = "pnpm --filter @workspace/susan-wang-group run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/susan-wang-group", "run", "build" ]
publicDir = "artifacts/susan-wang-group/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19121"
BASE_PATH = "/"
